# Local run uses embedded H2 (no Docker needed): ../../gradlew :examples:blog-app:bootRun
# Tests override the datasource with a Testcontainers Postgres via @ServiceConnection.
spring:
  datasource:
    url: jdbc:h2:mem:blog;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
